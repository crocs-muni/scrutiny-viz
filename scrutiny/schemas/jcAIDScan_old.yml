schema_version: "0.12"

defaults:
  data:
    type: list
  report:
    types: ["table"]
    theme: dark
  component:
    comparator: basic
    include_matches: true
    threshold_ratio: 0.05
    threshold_count: 0
  target: {}

sections:
  Basic information:
    data:
      record_schema:
        name:  { dtype: string, required: true }
        value: { dtype: string, required: false }
    component:
      comparator: basic
      match_key: name
      show_key: name

  Package AID:
    data:
      record_schema:
        package_key:    { dtype: string, required: true }
        package_aid:    { dtype: string, required: true }
        package_name:   { dtype: string, required: true }
        version:  { dtype: string, required: true }
    component:
      comparator: basic
      match_key: package_key
      show_key: package_name

  Full package AID support:
    data:
      record_schema:
        full_package_aid:      { dtype: string, required: true }
        supported:             { dtype: boolean, required: true }
        package_name_version:  { dtype: string, required: false }
    component:
      comparator: basic
      match_key: full_package_aid
      show_key: package_name_version