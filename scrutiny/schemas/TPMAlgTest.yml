schema_version: "0.13"

ingest:
  dynamic_sections: true
  strict_sections: false
  allow_missing_sections: true

defaults:
  data:
    type: list
    record_schema:
      algorithm:
        dtype: string
        required: true
        category: nominal
      op_name:
        dtype: string
        required: true
        category: nominal
      measurement_config:
        dtype: string
        category: nominal
      avg_ms:
        dtype: number
        category: continuous
      min_ms:
        dtype: number
        category: continuous
      max_ms:
        dtype: number
        category: continuous
      data_length:
        dtype: integer
        category: continuous
      total_iterations:
        dtype: integer
        category: continuous
      total_invocations:
        dtype: integer
        category: continuous
      error:
        dtype: string
        category: nominal
      notes:
        dtype: string
        category: nominal

  component:
    comparator: algperf
    match_key: algorithm
    show_key: op_name
    include_matches: true
    threshold_ratio: 0.50

  report:
    theme: dark
    types: ["chart", "radar"]

  target: {}

sections:
  TPM_INFO:
    data:
      type: list
      record_schema:
        name:
          dtype: string
          required: true
          category: nominal
        value:
          dtype: string
          required: true
          category: nominal
    component:
      comparator: basic
      match_key: name
      show_key: name
      include_matches: true
    report:
      types: ["table"]

  TPM2_Create: {}
  TPM2_Sign: {}
  TPM2_EncryptDecrypt: {}